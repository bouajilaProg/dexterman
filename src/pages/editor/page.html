<!-- @title pages/editor/page.html -->
<!-- @descrption Base editor HTML shell that hosts sidebar and editor placeholders before server-side embedding. -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles.css">
  <title>Architect | Docs</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #1a1b26;
      color: #c0caf5;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    [data-folder-list]:empty::before {
      content: 'Empty folder';
      display: block;
      padding: 0.5rem;
      font-size: 0.7rem;
      color: #565f89;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-[#1a1b26] text-[#c0caf5]">
  <div class="flex h-full">
    <aside class="w-12 flex flex-col items-center py-4 bg-[#16161e] border-r border-[#292e42]">
      <div class="p-3 text-[#7aa2f7] border-l-2 border-[#7aa2f7] bg-[#1a1b26]"><i data-lucide="folder-tree"
          class="w-5 h-5"></i></div>
      <div class="p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i data-lucide="history"
          class="w-5 h-5"></i></div>
      <div class="p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i data-lucide="cloud"
          class="w-5 h-5"></i></div>
      <div class="mt-auto p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i
          data-lucide="settings" class="w-5 h-5"></i></div>
    </aside>

    <div class="h-full" id="sidebar"></div>
    <div id="editor" class="flex-1"></div>
  </div>

  <script type="module" src="/editor/ui.js"></script>
  <script>
    // run lucid code
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
    });
  </script>
</body>

</html>
