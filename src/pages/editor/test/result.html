<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles.css">
  <title>Architect | Docs</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #1a1b26;
      color: #c0caf5;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Empty Folder Message */
    [data-folder-list]:empty::before {
      content: 'Empty folder';
      display: block;
      padding: 0.5rem;
      font-size: 0.7rem;
      color: #565f89;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>

<body class="h-screen overflow-hidden bg-[#1a1b26] text-[#c0caf5]">

  <!-- Templates for dynamic rows -->
  <template id="tpl-req-row">
    <tr class="border-t border-[#292e42]">
      <td class="p-2 w-1/2"><input type="text" value="" placeholder="field_name" class="bg-transparent w-full focus:text-[#7aa2f7] outline-none" /></td>
      <td class="p-2 w-1/4">
        <select class="bg-transparent outline-none text-[#565f89] cursor-pointer appearance-none">
          <option>string</option>
          <option>number</option>
          <option>object</option>
        </select>
      </td>
      <td class="p-2 w-20 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-black bg-[#292e42] text-[#565f89] cursor-pointer" data-action="toggle-req" data-handler="toggle">NO</span></td>
      <td class="p-2 w-10 text-center"><button class="text-[#565f89] hover:text-[#f7768e] transition-colors" data-action="delete" data-handler="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
    </tr>
  </template>

  <template id="tpl-res-row">
    <tr class="border-b border-[#292e42] last:border-0">
      <td class="p-2 w-1/2"><input type="text" value="" placeholder="field_name" class="bg-transparent w-full text-[#9ece6a] outline-none" /></td>
      <td class="p-2 w-1/4">
        <select class="bg-transparent outline-none text-[#565f89] cursor-pointer appearance-none">
          <option>string</option>
          <option>number</option>
          <option>object</option>
        </select>
      </td>
      <td class="p-2 w-10 text-right"><button class="text-[#565f89] hover:text-[#f7768e] transition-colors" data-action="delete" data-handler="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
    </tr>
  </template>

  <div class="flex h-full">
    <!-- Icon Sidebar -->
    <aside class="w-12 flex flex-col items-center py-4 bg-[#16161e] border-r border-[#292e42]">
      <div class="p-3 text-[#7aa2f7] border-l-2 border-[#7aa2f7] bg-[#1a1b26]"><i data-lucide="folder-tree" class="w-5 h-5"></i></div>
      <div class="p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i data-lucide="history" class="w-5 h-5"></i></div>
      <div class="p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i data-lucide="cloud" class="w-5 h-5"></i></div>
      <div class="mt-auto p-3 text-[#565f89] hover:text-[#c0caf5] transition-colors cursor-pointer"><i data-lucide="settings" class="w-5 h-5"></i></div>
    </aside>

    <!-- Collections Sidebar -->
    <aside class="w-72 bg-[#16161e] border-r border-[#292e42] flex flex-col">
      <div class="h-10 flex items-center justify-between px-4 border-b border-[#292e42]">
        <span class="text-[10px] font-bold text-[#565f89] uppercase tracking-widest">Collections</span>
        <button class="text-[#565f89] hover:text-[#7aa2f7] transition-colors"><i data-lucide="plus" class="w-4 h-4"></i></button>
      </div>
      <div class="p-2 space-y-2 overflow-y-auto">
        
        <details open class="group" data-folder-dropzone data-folder-name="auth">
          <summary class="flex items-center p-2 text-xs font-bold text-[#565f89] uppercase cursor-pointer list-none rounded hover:bg-[#1f2335] transition-colors">
            <i data-lucide="chevron-down" class="w-3 h-3 mr-2 group-open:rotate-0 -rotate-90 transition-transform"></i>
            auth
          </summary>
          <div class="ml-4 mt-1 p-1 space-y-1 min-h-[2rem]" data-folder-list>
            <div class="p-2 text-xs bg-[#7aa2f7]/10 border-l-2 border-[#7aa2f7] flex items-center rounded cursor-move"
              data-api-item data-api-name="login" draggable="true">
              <span class="text-[9px] font-black text-[#7aa2f7] mr-2">POST</span>
              <span>login</span>
              <span class="ml-auto text-[#565f89] truncate max-w-[80px]">/auth/login</span>
            </div>
          </div>
        </details>

        <details open class="group" data-folder-dropzone data-folder-name="users">
          <summary class="flex items-center p-2 text-xs font-bold text-[#565f89] uppercase cursor-pointer list-none rounded hover:bg-[#1f2335] transition-colors">
            <i data-lucide="chevron-down" class="w-3 h-3 mr-2 group-open:rotate-0 -rotate-90 transition-transform"></i>
            users
          </summary>
          <div class="ml-4 mt-1 p-1 space-y-1 min-h-[2rem]" data-folder-list>
            <div class="p-2 text-xs bg-[#1a1b26] border-l-2 border-[#9ece6a] flex items-center rounded cursor-move"
              data-api-item data-api-name="user" draggable="true">
              <span class="text-[9px] font-black text-[#9ece6a] mr-2">POST</span>
              <span>user</span>
              <span class="ml-auto text-[#565f89] truncate max-w-[80px]">/users/{family}</span>
            </div>
          </div>
        </details>

      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-[#1a1b26]">
      
      <!-- Top Action Bar -->
      <div class="p-4 border-b border-[#292e42] flex gap-2 items-center bg-[#1a1b26]">
        <div class="flex flex-1 border border-[#3b4261] rounded overflow-hidden">
          <select class="bg-[#1f2335] text-[#7aa2f7] font-black text-[10px] border-none focus:outline-none px-3 py-2 cursor-pointer appearance-none">
            <option>GET</option>
            <option selected>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
          <input class="flex-1 mono text-xs bg-[#1a1b26] text-[#c0caf5] focus:outline-none border-none px-3"
            value="https://api.dexter.man/auth/login" />
        </div>
        <button class="bg-[#7aa2f7] text-[#1a1b26] text-xs px-6 py-2 rounded font-bold hover:bg-[#7aa2f7]/80 transition-colors">SAVE</button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 space-y-8">
        
        <!-- Request Body -->
        <section class="group/req">
          <div class="flex justify-between items-end mb-3">
            <h3 class="text-[10px] font-bold text-[#565f89] uppercase tracking-widest">Request Body</h3>
            <button class="text-[#7aa2f7] text-xs font-bold hover:text-[#7aa2f7]/80 transition-colors" data-add="request" data-handler="add" data-target="req-body" data-tpl="tpl-req-row">+ ADD FIELD</button>
          </div>

          <div class="border border-[#292e42] rounded-lg overflow-hidden bg-[#16161e]">
            <table class="w-full text-left text-xs">
              <thead class="bg-[#1f2335] text-[#565f89]">
                <tr>
                  <th class="w-1/2 p-2 font-normal">FIELD NAME</th>
                  <th class="w-1/4 p-2 font-normal">TYPE</th>
                  <th class="w-20 p-2 font-normal text-center">REQ</th>
                  <th class="w-10 p-2"></th>
                </tr>
              </thead>
              <tbody id="req-body" class="mono empty:hidden">
                <tr class="border-t border-[#292e42]">
                  <td class="p-2"><input type="text" value="username" class="bg-transparent w-full focus:text-[#7aa2f7] outline-none" /></td>
                  <td class="p-2">
                    <select class="bg-transparent outline-none text-[#565f89] cursor-pointer appearance-none">
                      <option>string</option>
                      <option>number</option>
                      <option>object</option>
                    </select>
                  </td>
                  <td class="p-2 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-black bg-[#7aa2f7]/20 text-[#7aa2f7] cursor-pointer" data-action="toggle-req" data-handler="toggle">YES</span></td>
                  <td class="p-2 text-center"><button class="text-[#565f89] hover:text-[#f7768e] transition-colors" data-action="delete" data-handler="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
                </tr>
                <tr class="border-t border-[#292e42]">
                  <td class="p-2"><input type="text" value="password" class="bg-transparent w-full focus:text-[#7aa2f7] outline-none" /></td>
                  <td class="p-2">
                    <select class="bg-transparent outline-none text-[#565f89] cursor-pointer appearance-none">
                      <option>string</option>
                      <option>number</option>
                      <option>object</option>
                    </select>
                  </td>
                  <td class="p-2 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-black bg-[#7aa2f7]/20 text-[#7aa2f7] cursor-pointer" data-action="toggle-req" data-handler="toggle">YES</span></td>
                  <td class="p-2 text-center"><button class="text-[#565f89] hover:text-[#f7768e] transition-colors" data-action="delete" data-handler="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
                </tr>
              </tbody>
            </table>
            <div class="hidden group-has-[tbody:empty]/req:flex justify-center items-center p-8 text-xs text-[#565f89] italic">
              No request fields defined.
            </div>
          </div>
        </section>

        <!-- Response Output -->
        <section class="group/res">
          <div class="flex justify-between items-end mb-3">
            <h3 class="text-[10px] font-bold text-[#9ece6a] uppercase tracking-widest">Response Output</h3>
            <button class="text-[#9ece6a] text-xs font-bold hover:text-[#9ece6a]/80 transition-colors" data-add="response" data-handler="add" data-target="res-body" data-tpl="tpl-res-row">+ ADD FIELD</button>
          </div>

          <div class="border border-[#292e42] rounded-lg overflow-hidden bg-[#16161e]">
            <table class="w-full text-left text-xs">
              <tbody id="res-body" class="mono empty:hidden">
                <tr class="border-b border-[#292e42] last:border-0">
                  <td class="p-2 w-1/2"><input type="text" value="token" class="bg-transparent w-full text-[#9ece6a] outline-none" /></td>
                  <td class="p-2 w-1/4">
                    <select class="bg-transparent outline-none text-[#565f89] cursor-pointer appearance-none">
                      <option>string</option>
                      <option>number</option>
                      <option>object</option>
                    </select>
                  </td>
                  <td class="p-2 w-10 text-center"><button class="text-[#565f89] hover:text-[#f7768e] transition-colors" data-action="delete" data-handler="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td>
                </tr>
              </tbody>
            </table>
            <div class="hidden group-has-[tbody:empty]/res:flex justify-center items-center p-8 text-xs text-[#565f89] italic">
              No response fields defined.
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

</body>
</html>
